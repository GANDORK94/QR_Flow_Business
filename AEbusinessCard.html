<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d1117">
<title>Patrick Lowe · Account Executive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

<style>
/* ─── DESIGN TOKENS ─── */
:root {
  --c-bg:        #0d1117;
  --c-surface:   #161b22;
  --c-border:    rgba(255,255,255,0.08);
  --c-border-hi: rgba(255,255,255,0.16);
  --c-text-1:    #f0f6fc;
  --c-text-2:    #8b949e;
  --c-text-3:    #484f58;
  --c-accent:    #2ea043;
  --c-accent-bg: rgba(46,160,67,0.1);
  --c-blue:      #388bfd;
  --c-blue-bg:   rgba(56,139,253,0.1);
  --radius-sm:   8px;
  --radius-md:   14px;
  --radius-xl:   32px;
  --shadow-card: 0 16px 48px rgba(0,0,0,0.6), 0 4px 16px rgba(0,0,0,0.4);
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body:    'Outfit', system-ui, sans-serif;
  --ease-spring:  cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-smooth:  cubic-bezier(0.4, 0, 0.2, 1);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%;background:var(--c-bg)}
body{
  min-height:100%;font-family:var(--font-body);color:var(--c-text-1);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:env(safe-area-inset-top,24px) 20px env(safe-area-inset-bottom,40px);
  overflow-x:hidden;-webkit-font-smoothing:antialiased;
}

body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 40% at 50% -10%,rgba(46,160,67,0.08) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 100%,rgba(56,139,253,0.05) 0%,transparent 60%);
  pointer-events:none;z-index:0;
}

/* ─── CARD ─── */
.card{
  position:relative;z-index:1;
  width:100%;max-width:400px;
  background:var(--c-surface);
  border-radius:var(--radius-xl);
  border:1px solid var(--c-border);
  box-shadow:var(--shadow-card);
  overflow:hidden;
  opacity:0;transform:translateY(24px) scale(0.97);
  animation:card-enter 0.7s var(--ease-spring) 0.1s forwards;
}
@keyframes card-enter{to{opacity:1;transform:translateY(0) scale(1)}}

/* ─── HERO PHOTO ─── */
.hero{
  position:relative;
  height:280px;
  overflow:hidden;
  background:#0d1117;
}

.hero-img{
  /* Key fix: width 100%, height auto keeps native aspect ratio */
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center top;
  display:block;
  transform:scale(1.01);
  transition:transform 7s ease;
}

.card:hover .hero-img{transform:scale(1.05)}

.hero-scrim{
  position:absolute;inset:0;
  background:linear-gradient(
    to bottom,
    transparent 0%,
    transparent 25%,
    rgba(13,17,23,0.3) 50%,
    rgba(13,17,23,0.88) 72%,
    var(--c-surface) 100%
  );
}

/* ─── IDENTITY ─── */
.identity{
  position:absolute;bottom:0;left:0;right:0;
  padding:0 28px 22px;
}

.identity-badge{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(255,255,255,0.18);
  border:1px solid rgba(255,255,255,0.5);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border-radius:20px;padding:4px 12px 4px 8px;
  margin-bottom:10px;
  opacity:0;transform:translateY(8px);
  animation:fade-up 0.5s var(--ease-smooth) 0.55s forwards;
}

.badge-dot{
  width:7px;height:7px;border-radius:50%;
  background:#4ade80;
  box-shadow:0 0 7px rgba(74,222,128,0.9);
  animation:pulse-dot 2.5s ease-in-out infinite;
}
@keyframes pulse-dot{
  0%,100%{box-shadow:0 0 7px rgba(74,222,128,0.8)}
  50%{box-shadow:0 0 14px rgba(74,222,128,1),0 0 22px rgba(74,222,128,0.5)}
}

.badge-text{
  font-size:11px;font-weight:700;
  letter-spacing:0.08em;color:#ffffff;text-transform:uppercase;
}

.identity-name{
  font-family:var(--font-display);
  font-size:34px;font-weight:700;line-height:1.05;
  color:var(--c-text-1);letter-spacing:-0.01em;
  opacity:0;transform:translateY(8px);
  animation:fade-up 0.5s var(--ease-smooth) 0.65s forwards;
}

.identity-role{
  margin-top:4px;
  font-size:13px;font-weight:400;
  color:var(--c-text-2);letter-spacing:0.02em;
  opacity:0;transform:translateY(8px);
  animation:fade-up 0.5s var(--ease-smooth) 0.72s forwards;
}

/* ─── TAGLINE ─── */
.identity-tagline{
  margin-top:8px;
  font-family:var(--font-display);
  font-style:italic;
  font-size:13.5px;
  font-weight:400;
  color:rgba(240,246,252,0.75);
  line-height:1.45;
  letter-spacing:0.01em;
  opacity:0;transform:translateY(8px);
  animation:fade-up 0.5s var(--ease-smooth) 0.79s forwards;
}

@keyframes fade-up{to{opacity:1;transform:translateY(0)}}

/* ─── CONTACTS ─── */
.contacts{padding:4px 16px 16px}

.contact-link{
  display:grid;grid-template-columns:40px 1fr 20px;
  align-items:center;gap:0 12px;
  padding:11px 12px;border-radius:var(--radius-md);
  text-decoration:none;color:inherit;
  transition:background 0.18s var(--ease-smooth);
  opacity:0;transform:translateX(-10px);
}
.contact-link:nth-child(1){animation:slide-in 0.45s var(--ease-smooth) 0.85s forwards}
.contact-link:nth-child(2){animation:slide-in 0.45s var(--ease-smooth) 0.93s forwards}
.contact-link:nth-child(3){animation:slide-in 0.45s var(--ease-smooth) 1.01s forwards}
@keyframes slide-in{to{opacity:1;transform:translateX(0)}}

.contact-link:hover,.contact-link:focus-visible{background:rgba(255,255,255,0.04);outline:none}
.contact-link:focus-visible{box-shadow:0 0 0 2px var(--c-blue)}
.contact-link:active{background:rgba(255,255,255,0.07);transform:scale(0.99)}

.icon-box{
  width:40px;height:40px;border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:transform 0.18s var(--ease-spring);
}
.contact-link:hover .icon-box{transform:scale(1.08)}
.icon-box.email{background:rgba(56,139,253,0.12);border:1px solid rgba(56,139,253,0.2)}
.icon-box.phone{background:rgba(46,160,67,0.12);border:1px solid rgba(46,160,67,0.2)}
.icon-box.web{background:rgba(188,125,66,0.12);border:1px solid rgba(188,125,66,0.2)}
.icon-box svg{width:17px;height:17px;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round}
.icon-box.email svg{stroke:#79b8ff}
.icon-box.phone svg{stroke:#56d364}
.icon-box.web svg{stroke:#e3b341}

.contact-meta{min-width:0}
.contact-lbl{font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--c-text-3);margin-bottom:1px}
.contact-val{font-size:13.5px;font-weight:400;color:var(--c-text-1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:0.01em}

.chevron{color:var(--c-text-3);font-size:18px;line-height:1;transition:transform 0.18s var(--ease-smooth),color 0.18s}
.contact-link:hover .chevron{transform:translateX(2px);color:var(--c-text-2)}

/* ─── DIVIDER ─── */
.divider{
  height:1px;background:var(--c-border);margin:0 16px 16px;
  opacity:0;animation:fade-up 0.4s ease 1.08s forwards;
}

/* ─── CTA ─── */
.cta-wrap{
  padding:0 16px 20px;
  opacity:0;animation:fade-up 0.4s ease 1.12s forwards;
}

.save-btn{
  width:100%;padding:15px 24px;
  background:linear-gradient(135deg,#238636,#2ea043);
  border:none;border-radius:var(--radius-md);
  color:#fff;font-family:var(--font-body);
  font-size:14px;font-weight:600;letter-spacing:0.03em;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;
  position:relative;overflow:hidden;
  transition:transform 0.18s var(--ease-spring),box-shadow 0.18s;
  box-shadow:0 4px 16px rgba(46,160,67,0.25);
  -webkit-user-select:none;user-select:none;
}
.save-btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,0.12),transparent);
  border-radius:inherit;
}
.save-btn:hover{transform:translateY(-1px);box-shadow:0 6px 24px rgba(46,160,67,0.35)}
.save-btn:active{transform:scale(0.98) translateY(0);box-shadow:0 2px 8px rgba(46,160,67,0.2)}
.save-btn.saved{background:linear-gradient(135deg,#1a7f37,#238636)}
.save-btn svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

/* ─── FOOTER ─── */
.card-footer{
  display:flex;align-items:center;justify-content:center;gap:6px;
  padding:0 16px 20px;
  opacity:0;animation:fade-up 0.4s ease 1.2s forwards;
}
.footer-logo{
  width:16px;height:16px;
  background:linear-gradient(135deg,#238636,#2ea043);
  border-radius:4px;display:flex;align-items:center;justify-content:center;
}
.footer-logo svg{width:9px;height:9px;fill:#fff}
.footer-text{font-size:11px;color:var(--c-text-3);letter-spacing:0.04em}
.footer-link{font-size:11px;color:var(--c-text-2);text-decoration:none;letter-spacing:0.04em;transition:color 0.15s}
.footer-link:hover{color:var(--c-text-1)}

/* ─── TOAST ─── */
.toast{
  position:fixed;
  bottom:max(32px,env(safe-area-inset-bottom,32px));
  left:50%;transform:translateX(-50%) translateY(80px);
  background:#1c2128;border:1px solid var(--c-border-hi);
  border-radius:40px;padding:11px 22px;
  font-family:var(--font-body);font-size:13px;font-weight:500;color:var(--c-text-1);
  display:flex;align-items:center;gap:8px;
  opacity:0;transition:transform 0.45s var(--ease-spring),opacity 0.35s;
  z-index:100;white-space:nowrap;pointer-events:none;
  box-shadow:0 8px 32px rgba(0,0,0,0.4);
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast-icon{color:var(--c-accent);font-size:15px}
</style>
</head>
